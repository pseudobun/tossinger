name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  XCODE_VERSION: "26.2"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode Environment
        shell: bash
        run: |
          xcodebuild -version
          xcode-select -p
          xcodebuild -showsdks

      - name: Build macOS
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -scheme toss \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tee /tmp/xcodebuild-macos.log

          BUILD_EXIT="${PIPESTATUS[0]}"
          if [[ "${BUILD_EXIT}" -ne 0 ]]; then
            echo "----- Extracted compiler errors -----"
            grep -nE "error:|Command SwiftCompile failed|Command CompileSwift failed|Command SwiftEmitModule failed|fatal error:" /tmp/xcodebuild-macos.log || true
            exit "${BUILD_EXIT}"
          fi

  build-ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode Environment
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -q "iphonesimulator26"; then
            echo "Expected an iPhoneSimulator26 SDK, but current Xcode does not provide it." >&2
            exit 1
          fi

      - name: Select iOS Simulator
        id: select_simulator
        shell: bash
        run: |
          set -euo pipefail

          SIMULATOR_ID="$(
            xcodebuild -scheme toss -showdestinations \
              | sed -n 's/.*platform:iOS Simulator[^}]*id:\([^,}]*\).*/\1/p' \
              | grep -v "placeholder" \
              | head -n 1
          )"

          if [[ -z "${SIMULATOR_ID}" ]]; then
            echo "No available iOS simulator found on runner." >&2
            exit 1
          fi

          RUNNER_CPU_ARCH="$(uname -m)"
          case "${RUNNER_CPU_ARCH}" in
            arm64) DESTINATION_ARCH="arm64" ;;
            x86_64) DESTINATION_ARCH="x86_64" ;;
            *)
              echo "Unsupported runner architecture: ${RUNNER_CPU_ARCH}" >&2
              exit 1
              ;;
          esac

          DESTINATION_SPEC="platform=iOS Simulator,id=${SIMULATOR_ID},arch=${DESTINATION_ARCH}"

          echo "Using simulator ${SIMULATOR_ID}"
          echo "Using simulator arch ${DESTINATION_ARCH}"
          echo "simulator_id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          echo "destination_spec=${DESTINATION_SPEC}" >> "$GITHUB_OUTPUT"

      - name: Build iOS Simulator
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -scheme toss \
            -destination "${{ steps.select_simulator.outputs.destination_spec }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            2>&1 | tee /tmp/xcodebuild-ios.log

          BUILD_EXIT="${PIPESTATUS[0]}"
          if [[ "${BUILD_EXIT}" -ne 0 ]]; then
            echo "----- Extracted compiler errors -----"
            grep -nE "error:|Command SwiftCompile failed|Command CompileSwift failed|Command SwiftEmitModule failed" /tmp/xcodebuild-ios.log || true
            exit "${BUILD_EXIT}"
          fi
