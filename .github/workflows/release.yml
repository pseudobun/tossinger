name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Leave empty to use tag."
        required: false
        type: string

permissions:
  contents: write

env:
  XCODE_VERSION: "26.2"

jobs:
  # ─────────────────────────────────────────────────
  # macOS: Build, Sign, Notarize, Release, Tap Update
  # ─────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve version
        id: versioning
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            echo "::error::No version found. This workflow requires a tag or manual version input."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync Xcode versions
        run: |
          ./scripts/update_xcode_versions.sh \
            --marketing "$VERSION" \
            --build "$GITHUB_RUN_NUMBER"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Build macOS Release
        shell: bash
        run: |
          xcodebuild \
            -scheme toss \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

          APP_PATH="build/derived/Build/Products/Release/Tossinger.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "::error::Could not find built app at $APP_PATH"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Embed provisioning profile
        shell: bash
        env:
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "${MACOS_PROVISIONING_PROFILE_BASE64}" ]; then
            echo "::error::MACOS_PROVISIONING_PROFILE_BASE64 secret is not set"
            exit 1
          fi
          echo "${MACOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${APP_PATH}/Contents/embedded.provisionprofile"
          ls -la "${APP_PATH}/Contents/embedded.provisionprofile"
          # Verify the embedded profile authorizes the cert that will sign the binary.
          # If these get out of sync, amfi kills the binary at exec with
          # "Code Signature Invalid" even though codesign --verify passes.
          security cms -D -i "${APP_PATH}/Contents/embedded.provisionprofile" 2>/dev/null \
            | plutil -extract DeveloperCertificates.0 raw -o - - \
            | base64 --decode \
            | openssl x509 -inform DER -noout -subject -serial

      - name: Embed helper provisioning profile
        shell: bash
        env:
          MACOS_HELPER_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_HELPER_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "${MACOS_HELPER_PROVISIONING_PROFILE_BASE64}" ]; then
            echo "::error::MACOS_HELPER_PROVISIONING_PROFILE_BASE64 secret is not set"
            exit 1
          fi
          HELPER_PATH="${APP_PATH}/Contents/Helpers/toss.app"
          if [ ! -d "$HELPER_PATH" ]; then
            echo "::error::Embedded helper not found at $HELPER_PATH (target dependency / Copy Files phase missing?)"
            exit 1
          fi
          echo "${MACOS_HELPER_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${HELPER_PATH}/Contents/embedded.provisionprofile"
          ls -la "${HELPER_PATH}/Contents/embedded.provisionprofile"
          # Sanity-check that the helper profile authorizes the same cert the parent profile does.
          security cms -D -i "${HELPER_PATH}/Contents/embedded.provisionprofile" 2>/dev/null \
            | plutil -extract DeveloperCertificates.0 raw -o - - \
            | base64 --decode \
            | openssl x509 -inform DER -noout -subject -serial
          echo "HELPER_PATH=${HELPER_PATH}" >> "$GITHUB_ENV"

      - name: Prepare sanitized helper entitlements
        shell: bash
        run: |
          # Mirror the same shape as the parent's sanitized entitlements: subset of
          # what the helper's embedded provisioning profile authorizes, plus the
          # binding entitlements (application-identifier, team-identifier, icloud
          # environment) that codesign needs in order for amfi to validate the
          # restricted iCloud claims at exec time.
          HELPER_ENTITLEMENTS="${RUNNER_TEMP}/toss-cli-release.entitlements"
          cp tossinger/tossinger.entitlements "${HELPER_ENTITLEMENTS}"

          /usr/libexec/PlistBuddy -c "Add :com.apple.application-identifier string RFY9T5P84M.lutra-labs.toss.cli" "${HELPER_ENTITLEMENTS}"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string RFY9T5P84M" "${HELPER_ENTITLEMENTS}"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-container-environment string Production" "${HELPER_ENTITLEMENTS}"

          echo "--- Sanitized helper entitlements ---"
          cat "${HELPER_ENTITLEMENTS}"
          echo "HELPER_ENTITLEMENTS_PATH=${HELPER_ENTITLEMENTS}" >> "$GITHUB_ENV"

      - name: Codesign helper with hardened runtime
        shell: bash
        run: |
          # Inside-out signing: the helper must be signed before the parent so the
          # parent codesign can validate the nested signature. Same Developer ID
          # Application cert as the parent, but different bundle id, different
          # provisioning profile, different application-identifier entitlement.
          codesign \
            --force --options runtime --timestamp \
            --entitlements "${HELPER_ENTITLEMENTS_PATH}" \
            --sign "${{ secrets.MACOS_DEVELOPER_ID_APP_CERT }}" \
            "${HELPER_PATH}"
          codesign --verify --strict --verbose=2 "${HELPER_PATH}"
          codesign --display --entitlements :- "${HELPER_PATH}"

      - name: Prepare sanitized entitlements
        shell: bash
        run: |
          # Build a release entitlements file that matches what the embedded
          # Developer ID provisioning profile authorizes. amfi requires that:
          #   1. The signed entitlements form a subset of the profile's.
          #   2. The signed entitlements include com.apple.application-identifier
          #      and com.apple.developer.team-identifier so the system can match
          #      the embedded profile to the binary. Without these, restricted
          #      entitlements (CloudKit, app groups) have no profile backing and
          #      the process is killed at exec with "Code Signature Invalid".
          SANITIZED="${RUNNER_TEMP}/toss-release.entitlements"
          cp toss/toss.entitlements "${SANITIZED}"

          # Strip aps-environment: the source file declares "development" but
          # the Developer ID profile authorizes "production"; signed entitlements
          # must be a subset of the profile and we don't use APNs on macOS.
          /usr/libexec/PlistBuddy -c "Delete :aps-environment" "${SANITIZED}" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.aps-environment" "${SANITIZED}" 2>/dev/null || true

          # Substitute $(CFBundleIdentifier) which xcodebuild expands at build
          # time but bare codesign does not.
          /usr/bin/sed -i '' 's|iCloud\.\$(CFBundleIdentifier)|iCloud.lutra-labs.toss|g' "${SANITIZED}"

          # Inject the binding entitlements that Xcode normally adds from the
          # embedded profile. Hardcoded because these are stable for this app.
          /usr/libexec/PlistBuddy -c "Add :com.apple.application-identifier string RFY9T5P84M.lutra-labs.toss" "${SANITIZED}"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string RFY9T5P84M" "${SANITIZED}"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-container-environment string Production" "${SANITIZED}"

          echo "--- Sanitized entitlements ---"
          cat "${SANITIZED}"
          echo "ENTITLEMENTS_PATH=${SANITIZED}" >> "$GITHUB_ENV"

      - name: Codesign with hardened runtime
        shell: bash
        run: |
          # No --deep: the embedded helper at Contents/Helpers/toss.app is already
          # signed with its own entitlements + provisioning profile by the
          # "Codesign helper with hardened runtime" step above, and Apple DTS
          # explicitly recommends against --deep when entitlements are involved.
          codesign \
            --force --options runtime --timestamp \
            --entitlements "${ENTITLEMENTS_PATH}" \
            --sign "${{ secrets.MACOS_DEVELOPER_ID_APP_CERT }}" \
            "${APP_PATH}"
          codesign --verify --strict --verbose=2 "${APP_PATH}"
          codesign --display --entitlements :- "${APP_PATH}"

      - name: Verify nested signature stack
        shell: bash
        run: |
          # Walk the entire bundle (parent + helper) and confirm both signatures
          # validate. This catches the failure mode where the helper is unsigned
          # or the helper's entitlements got rejected at parent codesign time.
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          # Gatekeeper assessment — same check the OS runs before launch.
          spctl --assess --type execute --verbose "${APP_PATH}" || true

      - name: Notarize (non-blocking) and opportunistically staple
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p build
          NOTARY_PATH="build/Tossinger-${VERSION}-macos.notarization.txt"

          ZIP_TMP="${RUNNER_TEMP}/Tossinger-notarize.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_TMP}"

          KEY_PATH="${RUNNER_TEMP}/notary_key.p8"
          echo "${ASC_PRIVATE_KEY}" | base64 --decode > "${KEY_PATH}"

          NOTARY_ARGS=(
            --key "${KEY_PATH}"
            --key-id "${ASC_KEY_ID}"
            --issuer "${ASC_ISSUER_ID}"
          )

          # Submit and capture submission ID
          SUBMIT_OUT=$(xcrun notarytool submit "${ZIP_TMP}" "${NOTARY_ARGS[@]}" 2>&1)
          echo "${SUBMIT_OUT}"
          SUBMISSION_ID=$(echo "${SUBMIT_OUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ -z "${SUBMISSION_ID}" ]; then
            echo "::error::Failed to extract submission ID from notarytool output"
            exit 1
          fi
          echo "Submission ID: ${SUBMISSION_ID}"

          # Persist submission ID as a release asset so the staple workflow can find it later
          printf "%s\n" "${SUBMISSION_ID}" > "${NOTARY_PATH}"
          echo "NOTARY_PATH=${NOTARY_PATH}" >> "$GITHUB_ENV"

          # Opportunistic 5-minute poll: if Apple is fast, we get a stapled release in one run.
          # Otherwise we ship unstapled and let the staple-release workflow catch up later.
          TIMEOUT=300
          INTERVAL=30
          ELAPSED=0
          FINAL_STATUS="InProgress"

          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            STATUS_OUT=$(xcrun notarytool info "${SUBMISSION_ID}" "${NOTARY_ARGS[@]}" 2>&1)
            STATUS=$(echo "${STATUS_OUT}" | grep -i "status:" | head -1 | awk '{print $NF}')
            echo "[${ELAPSED}s] Notarization status: ${STATUS}"

            case "${STATUS}" in
              Accepted)
                FINAL_STATUS="Accepted"
                break
                ;;
              Invalid|Rejected)
                FINAL_STATUS="${STATUS}"
                break
                ;;
            esac
          done

          case "${FINAL_STATUS}" in
            Accepted)
              echo "Notarization succeeded within opportunistic window — stapling now."
              xcrun stapler staple "${APP_PATH}"
              ;;
            Invalid|Rejected)
              echo "::error::Notarization failed with status: ${FINAL_STATUS} (submission: ${SUBMISSION_ID})"
              xcrun notarytool log "${SUBMISSION_ID}" "${NOTARY_ARGS[@]}" 2>&1 || true
              exit 1
              ;;
            *)
              echo "::warning::Notarization still In Progress after ${TIMEOUT}s (submission: ${SUBMISSION_ID}). Shipping unstapled — Gatekeeper will validate online once Apple accepts. Run the staple-release workflow later: gh workflow run staple-release.yml -f version=${VERSION}"
              ;;
          esac

      - name: Package zip and compute SHA256
        id: package
        shell: bash
        run: |
          mkdir -p build
          ZIP_PATH="build/Tossinger-${VERSION}-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"

          SHA256="$(shasum -a 256 "${ZIP_PATH}" | awk '{print $1}')"
          SHA_PATH="build/Tossinger-${VERSION}-macos.sha256.txt"
          printf "%s  %s\n" "${SHA256}" "$(basename "${ZIP_PATH}")" > "${SHA_PATH}"

          echo "ZIP_PATH=${ZIP_PATH}" >> "$GITHUB_ENV"
          echo "SHA_PATH=${SHA_PATH}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
            ${{ env.NOTARY_PATH }}

      - name: Update Homebrew tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Tossinger-${VERSION}-macos.zip"

          TAP_DIR="${RUNNER_TEMP}/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pseudobun/homebrew-tap.git" "${TAP_DIR}"
          mkdir -p "${TAP_DIR}/Casks"

          cat > "${TAP_DIR}/Casks/tossinger.rb" <<CASK_EOF
          cask "tossinger" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${DOWNLOAD_URL}"
            name "Tossinger"
            desc "Save links and selected text for later"
            homepage "https://github.com/pseudobun/tossinger"

            depends_on macos: ">= :sequoia"

            app "Tossinger.app"

            # CLI helper embedded inside Tossinger.app. Brew creates a symlink
            # at \$(brew --prefix)/bin/toss so users can run \`toss list/add/delete\`
            # from any terminal.
            binary "#{appdir}/Tossinger.app/Contents/Helpers/toss.app/Contents/MacOS/toss",
                   target: "toss"

            zap trash: [
              "~/Library/Application Support/lutra-labs.toss",
              "~/Library/Preferences/lutra-labs.toss.plist",
              "~/Library/Caches/lutra-labs.toss",
            ]
          end
          CASK_EOF

          cd "${TAP_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tossinger.rb
          git diff --cached --quiet || git commit -m "tossinger ${VERSION}"
          git push

  # ─────────────────────────────────────────────
  # iOS: Archive, Export IPA, Upload to TestFlight
  # ─────────────────────────────────────────────
  ios:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            echo "::error::No version found. This workflow requires a tag or manual version input."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Sync Xcode versions
        run: |
          ./scripts/update_xcode_versions.sh \
            --marketing "$VERSION" \
            --build "$GITHUB_RUN_NUMBER"

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profiles
        shell: bash
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/toss.mobileprovision
          TOSS_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i /tmp/toss.mobileprovision)")
          cp /tmp/toss.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${TOSS_UUID}.mobileprovision
          echo "TOSS_PROFILE_UUID=${TOSS_UUID}" >> "$GITHUB_ENV"

          echo "${{ secrets.IOS_SHARE_EXT_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/tossShare.mobileprovision
          SHARE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i /tmp/tossShare.mobileprovision)")
          cp /tmp/tossShare.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${SHARE_UUID}.mobileprovision
          echo "SHARE_PROFILE_UUID=${SHARE_UUID}" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          KEY_PATH="${RUNNER_TEMP}/asc_key.p8"
          echo "${{ secrets.ASC_PRIVATE_KEY }}" | base64 --decode > "${KEY_PATH}"
          echo "ASC_KEY_PATH=${KEY_PATH}" >> "$GITHUB_ENV"
          mkdir -p ~/.appstoreconnect/private_keys
          cp "${KEY_PATH}" ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive iOS
        shell: bash
        run: |
          xcodebuild archive \
            -scheme toss \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Tossinger.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${ASC_KEY_PATH}" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Export IPA
        shell: bash
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Tossinger.xcarchive \
            -exportOptionsPlist export-options/ios-export-options.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${ASC_KEY_PATH}" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        shell: bash
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/Tossinger.ipa \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
