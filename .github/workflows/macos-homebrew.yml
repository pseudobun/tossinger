name: macOS Homebrew Artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Leave empty to use tag/package.json."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version
        id: versioning
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync Xcode marketing version
        run: ./scripts/update_xcode_versions.sh --marketing "$VERSION"

      - name: Build macOS app
        shell: bash
        run: |
          xcodebuild \
            -scheme toss \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

          APP_PATH="build/derived/Build/Products/Release/Tossinger.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Could not find built app at $APP_PATH" >&2
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate (optional)
        if: ${{ secrets.MACOS_CERT_P12_BASE64 != '' && secrets.MACOS_CERT_PASSWORD != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Optional sign + package + notarize
        id: package
        shell: bash
        env:
          MACOS_DEVELOPER_ID_APP_CERT: ${{ secrets.MACOS_DEVELOPER_ID_APP_CERT }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_PRIVATE_KEY: ${{ secrets.NOTARY_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p build
          ZIP_BASENAME="Tossinger-${VERSION}-macos"
          ZIP_PATH="build/${ZIP_BASENAME}.zip"
          SHA_PATH="build/${ZIP_BASENAME}.sha256.txt"

          if [[ -n "${MACOS_DEVELOPER_ID_APP_CERT:-}" ]]; then
            echo "Signing app with Developer ID identity."
            codesign \
              --force \
              --deep \
              --options runtime \
              --timestamp \
              --sign "${MACOS_DEVELOPER_ID_APP_CERT}" \
              "${APP_PATH}"

            codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          else
            echo "No Developer ID identity configured. Skipping signing."
          fi

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"

          if [[ -n "${MACOS_DEVELOPER_ID_APP_CERT:-}" && -n "${NOTARY_KEY_ID:-}" && -n "${NOTARY_ISSUER_ID:-}" && -n "${NOTARY_PRIVATE_KEY:-}" ]]; then
            echo "Submitting zip for notarization."
            KEY_PATH="${RUNNER_TEMP}/notary_key.p8"
            echo "${NOTARY_PRIVATE_KEY}" | base64 --decode > "${KEY_PATH}"

            xcrun notarytool submit "${ZIP_PATH}" \
              --key "${KEY_PATH}" \
              --key-id "${NOTARY_KEY_ID}" \
              --issuer "${NOTARY_ISSUER_ID}" \
              --wait

            xcrun stapler staple "${APP_PATH}"
            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"
          else
            echo "Notary secrets not fully configured (or app unsigned). Skipping notarization."
          fi

          SHA256="$(shasum -a 256 "${ZIP_PATH}" | awk '{print $1}')"
          printf "%s  %s\n" "${SHA256}" "$(basename "${ZIP_PATH}")" > "${SHA_PATH}"

          echo "ZIP_PATH=${ZIP_PATH}" >> "$GITHUB_ENV"
          echo "SHA_PATH=${SHA_PATH}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha_path=${SHA_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Create/update GitHub release with artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
          generate_release_notes: true

      - name: Release summary
        shell: bash
        run: |
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/$(basename "${ZIP_PATH}")"

          {
            echo "### Homebrew Artifact"
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Zip: \`${ZIP_PATH}\`"
            echo "- sha256: \`${SHA256}\`"
            echo "- URL: ${DOWNLOAD_URL}"
            echo ""
            echo "Cask snippet:"
            echo '```ruby'
            echo 'cask "tossinger" do'
            echo "  version \"${VERSION}\""
            echo "  sha256 \"${SHA256}\""
            echo ""
            echo "  url \"${DOWNLOAD_URL}\""
            echo '  name "Tossinger"'
            echo '  desc "Save links and selected text for later"'
            echo '  homepage "https://github.com/pseudobun/toss"'
            echo ""
            echo '  app "Tossinger.app"'
            echo "end"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
